<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba Sprint II - reCAPTCHA v3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://www.google.com/recaptcha/api.js?render=6Ld2lsAsAAAAANONq5oHuid94iiCQBEECpWMGtQl"></script>
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow p-4" style="width: 100%; max-width: 400px;">
        <h3 class="text-center mb-4 text-primary">Generar OTP (v3 Invisible)</h3>
        
        <form id="form-generar-otp">
            <div class="mb-3">
                <label for="username" class="form-label">Usuario</label>
                <input type="text" class="form-control" id="username" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100" id="btn-submit">Generar Código</button>
        </form>

        <div id="resultado" class="mt-4 text-center" style="display: none;">
            <div class="alert alert-info" id="mensaje-texto"></div>
        </div>
    </div>

    <script>
        document.getElementById('form-generar-otp').addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            const btn = document.getElementById('btn-submit');
            btn.innerText = "Verificando seguridad...";
            btn.disabled = true;

            grecaptcha.ready(function() {
                // AQUÍ TAMBIÉN PON TU CLAVE DE SITIO PÚBLICA
                grecaptcha.execute('6Ld2lsAsAAAAANONq5oHuid94iiCQBEECpWMGtQl', {action: 'generar_otp'}).then(async function(captchaToken) {
                    
                    const username = document.getElementById('username').value;
                    const password = document.getElementById('password').value;
                    
                    try {
                        const response = await fetch('http://127.0.0.1:8000/auth/generate', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                username: username,
                                password: password,
                                captchaToken: captchaToken // Enviamos el token generado de forma invisible
                            })
                        });

                        const data = await response.json();
                        const divResultado = document.getElementById('resultado');
                        const divMensaje = document.getElementById('mensaje-texto');

                        divResultado.style.display = 'block';

                        if (response.ok) {
                            divMensaje.className = "alert alert-success";
                            divMensaje.innerHTML = `<strong>¡Éxito!</strong><br>${data.mensaje}<br>Se envió a: <b>${data.destinator_hint}</b>`;
                        } else {
                            divMensaje.className = "alert alert-danger";
                            divMensaje.innerHTML = `<strong>Error:</strong> ${data.detail}`;
                        }
                    } catch (error) {
                        alert("Error de conexión. ¿Está encendido tu servidor de FastAPI?");
                    } finally {
                        btn.innerText = "Generar Código";
                        btn.disabled = false;
                    }
                });
            });
        });
    </script>
</body>
</html>
